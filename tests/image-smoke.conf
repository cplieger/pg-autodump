# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Waits for the container HEALTHCHECK (the
# `pg-autodump health` file-marker probe) to report "healthy" - proving the
# binary boots in the real base, its startup preflight passes (pg_dump/
# pg_restore/psql present, /dumps writable, DB_SPECS non-empty), and the probe
# works. Preflight never dials the database, so a dummy unreachable spec is
# enough (no live DB needed).
SMOKE_APP_NAME=pg-autodump
SMOKE_TIMEOUT=60
# Non-empty DB_SPECS (never dialed) + a writable /dumps tmpfs are the only
# inputs preflight needs to mark healthy.
SMOKE_RUN_ARGS="-e DB_SPECS=db.smoke:5432:smokedb:smoke --tmpfs /dumps:size=16m,mode=1777"
